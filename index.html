<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DISCONNECT+ | The Band</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://cdn.staticfile.org/react/18.2.0/umd/react.development.js"></script>
    <script crossorigin src="https://cdn.staticfile.org/react-dom/18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.staticfile.org/babel-standalone/7.23.5/babel.min.js"></script>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap');
      body { background-color: #000; color: #e5e5e5; font-family: 'Space Mono', monospace; overflow-x: hidden; }
      h1, h2, h3, h4 { font-family: 'Cinzel', serif; }
      
      .glitch-text { position: relative; display: inline-block; }
      .glitch-text::before, .glitch-text::after {
        content: attr(data-text); position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000;
      }
      .glitch-text::before {
        left: 2px; text-shadow: -1px 0 #ff00c1; clip: rect(44px, 9999px, 56px, 0);
        animation: glitch-anim 5s infinite linear alternate-reverse;
      }
      .glitch-text::after {
        left: -2px; text-shadow: -1px 0 #00fff9; clip: rect(44px, 9999px, 56px, 0);
        animation: glitch-anim2 5s infinite linear alternate-reverse;
      }
      @keyframes glitch-anim {
        0% { clip: rect(10px, 9999px, 30px, 0); } 20% { clip: rect(40px, 9999px, 60px, 0); }
        40% { clip: rect(70px, 9999px, 20px, 0); } 60% { clip: rect(10px, 9999px, 80px, 0); }
        80% { clip: rect(50px, 9999px, 40px, 0); } 100% { clip: rect(90px, 9999px, 10px, 0); }
      }
      @keyframes glitch-anim2 {
        0% { clip: rect(5px, 9999px, 25px, 0); } 20% { clip: rect(25px, 9999px, 50px, 0); }
        40% { clip: rect(15px, 9999px, 35px, 0); } 60% { clip: rect(60px, 9999px, 20px, 0); }
        80% { clip: rect(80px, 9999px, 40px, 0); } 100% { clip: rect(30px, 9999px, 60px, 0); }
      }
      ::-webkit-scrollbar { width: 5px; }
      ::-webkit-scrollbar-thumb { background: #333; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- CONSTANTS ---
        const IMAGES = {
            BEACH: "./images/skeleton_beach.jpg",
            LIGHTNING: "./images/skeleton_lightning.jpg",
            GUITAR: "./images/guitar.jpg",
            SYNTH: "./images/synth.jpg",
            RECORD: "./images/my_record.jpg",
            TEE: "./images/hc.jpg",
            ART: "./images/qz.jpg"
        };

        const SONGS = [
            { id: 1, title: "荒川Arakawa", duration: "03:42", src: "./audio/荒川.mp3" },
            { id: 2, title: "游园地amusement park", duration: "04:15", src: "./audio/游园地.mp3" }
        ];

        const MEMBERS = [
            { name: "Kunbo", zh: "琨波", role: "Guitar / Visuals", role_zh: "吉他 / 视觉", img: IMAGES.GUITAR, desc: "Visual noise as audio.", desc_zh: "将视觉噪音编织成音频。" },
            { name: "Wenye", zh: "文野", role: "Synth / Production", role_zh: "合成器 / 制作", img: IMAGES.SYNTH, desc: "Architect of sound.", desc_zh: "声景的构建者。" }
        ];

        const NEWS = [
            { date: "DEC 08", title: "EP Out Now", zh: "同名EP现已发售" },
            { date: "NOV 25", title: "Secret Show Recap", zh: "秘密演出回顾" }
        ];

        const MERCH = [
            { id: 1, name: "Vinyl EP", zh: "黑胶唱片", price: "$35", img: IMAGES.RECORD },
            { id: 2, name: "Ritual Tee", zh: "仪式感T恤", price: "$25", img: IMAGES.TEE },
            { id: 3, name: "Hoodie", zh: "断连卫衣", price: "$55", img: IMAGES.LIGHTNING },
            { id: 4, name: "Artwork", zh: "画作海报", price: "$15", img: IMAGES.ART }
        ];

        const CONTENT = {
            en: { nav: ["MUSIC", "NEWS", "MEMBERS", "VISUALS", "STORE", "LOGS"], hero: "Surrealist Collective", music: "TRANSMISSIONS", guestbook: "VOICE LOGS" },
            zh: { nav: ["音乐", "动态", "成员", "视觉", "商店", "留言"], hero: "超现实视听集合体", music: "信号传输", guestbook: "虚空回响" }
        };

        // --- COMPONENTS ---
        const Guestbook = ({ lang }) => {
            const [msgs, setMsgs] = React.useState([]);
            const [name, setName] = React.useState('');
            const [text, setText] = React.useState('');

            React.useEffect(() => {
                const saved = localStorage.getItem('disconnect_msgs');
                if (saved) setMsgs(JSON.parse(saved));
            }, []);

            const send = (e) => {
                e.preventDefault();
                if (!text.trim()) return;
                const newMsgs = [{ id: Date.now(), name: name || "Anonymous", text }, ...msgs];
                setMsgs(newMsgs);
                localStorage.setItem('disconnect_msgs', JSON.stringify(newMsgs));
                setName(''); setText('');
            };

            return (
                <div className="max-w-4xl mx-auto flex flex-col md:flex-row gap-8">
                    <form onSubmit={send} className="w-full md:w-1/3 flex flex-col gap-4">
                        <input value={name} onChange={e=>setName(e.target.value)} placeholder="CODENAME" className="bg-white/5 border border-gray-800 p-3 text-xs focus:border-white outline-none" />
                        <textarea value={text} onChange={e=>setText(e.target.value)} placeholder="MESSAGE..." rows="3" className="bg-white/5 border border-gray-800 p-3 text-xs focus:border-white outline-none resize-none" />
                        <button className="bg-white text-black py-2 text-[10px] font-bold uppercase hover:bg-red-600 hover:text-white transition-all">Submit</button>
                    </form>
                    <div className="w-full md:w-2/3 max-h-[250px] overflow-y-auto space-y-4 pr-2">
                        {msgs.map(m => (
                            <div key={m.id} className="border border-gray-900 p-4">
                                <div className="text-[10px] text-gray-400 mb-1">{m.name}</div>
                                <div className="text-xs text-gray-500">{m.text}</div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const App = () => {
            const [lang, setLang] = React.useState('zh');
            const [scrolled, setScrolled] = React.useState(false);
            const t = CONTENT[lang];

            React.useEffect(() => {
                window.addEventListener('scroll', () => setScrolled(window.scrollY > 50));
            }, []);

            return (
                <div className="min-h-screen">
                    <nav className={`fixed top-0 w-full z-50 transition-all ${scrolled ? 'bg-black/90 py-4 border-b border-white/10' : 'py-6'}`}>
                        <div className="container mx-auto px-6 flex justify-between items-center">
                            <div className="flex items-center gap-4">
                                <span className="font-cinzel font-black text-xl">DISCONNECT+</span>
                                <button onClick={()=>setLang(l=>l==='en'?'zh':'en')} className="text-[9px] border border-white/20 px-2 py-1 hover:bg-white hover:text-black transition-all">
                                    {lang==='en'?'中文':'EN'}
                                </button>
                            </div>
                            <div className="hidden md:flex gap-6 text-[10px] font-bold">
                                {t.nav.map((n, i) => <a key={i} href={`#${["music", "news", "members", "visuals", "store", "logs"][i]}`} className="hover:text-red-500">{n}</a>)}
                            </div>
                        </div>
                    </nav>

                    <header className="h-screen flex items-center justify-center relative px-4 overflow-hidden text-center">
                        <img src={IMAGES.BEACH} className="absolute inset-0 w-full h-full object-cover opacity-40 grayscale" />
                        <div className="relative z-10">
                            <h1 className="text-4xl sm:text-6xl md:text-9xl font-black glitch-text" data-text="DISCONNECT+">DISCONNECT+</h1>
                            <p className="mt-4 text-[10px] tracking-[0.4em] uppercase text-gray-400">{t.hero}</p>
                        </div>
                    </header>

                    <section id="music" className="py-24 px-6 bg-zinc-950">
                        <div className="container mx-auto flex flex-col md:flex-row gap-12 items-center">
                            <img src={IMAGES.LIGHTNING} className="w-full md:w-1/3 grayscale border border-gray-800" />
                            <div className="w-full md:w-2/3">
                                <h2 className="text-2xl font-cinzel mb-8 border-b border-gray-800 pb-2">{t.music}</h2>
                                {SONGS.map(s => (
                                    <div key={s.id} className="p-4 hover:bg-white/5 border-b border-gray-900 flex justify-between text-sm cursor-pointer group">
                                        <span className="group-hover:text-red-500">▶ {s.title}</span>
                                        <span className="text-gray-600 font-mono text-xs">{s.duration}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    <section id="members" className="py-24 px-6 bg-black">
                        <div className="container mx-auto">
                            <h2 className="text-3xl font-cinzel text-center mb-16">{lang==='zh'?'实体':'THE ENTITIES'}</h2>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-12 max-w-4xl mx-auto">
                                {MEMBERS.map((m, i) => (
                                    <div key={i} className="group">
                                        <img src={m.img} className="aspect-[3/4] object-cover grayscale opacity-60 group-hover:opacity-100 transition-all duration-700 border border-gray-900" />
                                        <h3 className="text-xl mt-4 font-cinzel">{lang==='zh'?m.zh:m.name}</h3>
                                        <p className="text-[10px] text-red-500 uppercase">{lang==='zh'?m.role_zh:m.role}</p>
                                        <p className="text-xs text-gray-500 mt-2 font-mono">{lang==='zh'?m.desc_zh:m.desc}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    <section id="news" className="py-24 px-6 bg-zinc-950">
                        <div className="max-w-4xl mx-auto">
                            <h2 className="text-3xl font-cinzel text-center mb-12 uppercase">{lang==='zh'?'最新讯号':'Transmissions'}</h2>
                            {NEWS.map((n, i) => (
                                <div key={i} className="flex gap-8 py-6 border-b border-gray-900 items-baseline">
                                    <span className="font-cinzel text-xl text-white">{n.date}</span>
                                    <span className="text-xs font-mono text-gray-400 uppercase tracking-widest">{lang==='zh'?n.zh:n.title}</span>
                                </div>
                            ))}
                        </div>
                    </section>

                    <section id="visuals" className="py-24 px-6 bg-black">
                        <div className="container mx-auto text-center">
                            <h2 className="text-3xl font-cinzel mb-16 uppercase">{lang==='zh'?'视觉档案':'Visuals'}</h2>
                            <div className="grid md:grid-cols-2 gap-8 max-w-5xl mx-auto">
                                <div className="aspect-video bg-zinc-900 border border-gray-800 flex items-center justify-center text-[10px] text-gray-600 uppercase">Signal Lost</div>
                                <div className="aspect-video bg-zinc-900 border border-gray-800 flex items-center justify-center text-[10px] text-gray-600 uppercase">Signal Lost</div>
                            </div>
                        </div>
                    </section>

                    <section id="store" className="py-24 px-6 bg-zinc-950">
                        <div className="container mx-auto">
                            <h2 className="text-3xl font-cinzel text-center mb-16 uppercase">{lang==='zh'?'商店':'Artifacts'}</h2>
                            <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
                                {MERCH.map(m => (
                                    <div key={m.id} className="border border-gray-900 p-2 group hover:border-white transition-all">
                                        <div className="aspect-square bg-black mb-4 overflow-hidden">
                                            <img src={m.img} className="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-700" />
                                        </div>
                                        <div className="text-[10px] font-bold uppercase truncate">{lang==='zh'?m.zh:m.name}</div>
                                        <div className="text-[9px] text-gray-500 mt-1">{m.price}</div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    <section id="logs" className="py-24 px-6 bg-black border-t border-gray-900">
                        <div className="container mx-auto">
                            <h2 className="text-2xl font-cinzel text-center mb-12 uppercase">{t.guestbook}</h2>
                            <Guestbook lang={lang} />
                        </div>
                    </section>

                    <footer className="py-12 bg-black border-t border-gray-900 text-center text-[8px] text-gray-700 font-mono tracking-widest uppercase">
                        &copy; 2024 DISCONNECT+. Designed in the Void.
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
