<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DISCONNECT+ | The Band</title>
    
    <!-- 1. 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 2. 引入 React 和 Babel -->
    <script crossorigin src="https://cdn.staticfile.org/react/18.2.0/umd/react.development.js"></script>
    <script crossorigin src="https://cdn.staticfile.org/react-dom/18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.staticfile.org/babel-standalone/7.23.5/babel.min.js"></script>

    <!-- 3. 自定义样式 -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap');
      
      body { background-color: #000; color: #e5e5e5; font-family: 'Space Mono', monospace; overflow-x: hidden; }
      h1, h2, h3, h4 { font-family: 'Cinzel', serif; }
      
      .glitch-text { position: relative; display: inline-block; }
      .glitch-text::before, .glitch-text::after {
        content: attr(data-text); position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000;
      }
      .glitch-text::before {
        left: 2px; text-shadow: -1px 0 #ff00c1; clip: rect(44px, 9999px, 56px, 0);
        animation: glitch-anim 5s infinite linear alternate-reverse;
      }
      .glitch-text::after {
        left: -2px; text-shadow: -1px 0 #00fff9; clip: rect(44px, 9999px, 56px, 0);
        animation: glitch-anim2 5s infinite linear alternate-reverse;
      }
      
      /* 优化后的动画裁剪区域，适应不同屏幕尺寸 */
      @keyframes glitch-anim {
        0% { clip: rect(10px, 9999px, 30px, 0); } 20% { clip: rect(40px, 9999px, 60px, 0); }
        40% { clip: rect(70px, 9999px, 20px, 0); } 60% { clip: rect(10px, 9999px, 80px, 0); }
        80% { clip: rect(50px, 9999px, 40px, 0); } 100% { clip: rect(90px, 9999px, 10px, 0); }
      }
      @keyframes glitch-anim2 {
        0% { clip: rect(5px, 9999px, 25px, 0); } 20% { clip: rect(25px, 9999px, 50px, 0); }
        40% { clip: rect(15px, 9999px, 35px, 0); } 60% { clip: rect(60px, 9999px, 20px, 0); }
        80% { clip: rect(80px, 9999px, 40px, 0); } 100% { clip: rect(30px, 9999px, 60px, 0); }
      }

      @keyframes fade-in {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in { animation: fade-in 0.5s ease-out forwards; }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #000; }
      ::-webkit-scrollbar-thumb { background: #333; }
      ::-webkit-scrollbar-thumb:hover { background: #555; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- 核心常量 (注意：请务必确保 GitHub 上的文件名大小写与此处一致) ---
        const BAND_IMAGES = {
            RIBCAGE_DETAIL: "./images/ribcage_detail.jpg", 
            DINO_RUN: "./images/dino_run.jpg",
            TREX_WAVE: "./images/trex_wave.jpg",
            SKELETON_STAND: "./images/skeleton_stand.jpg",
            RIBCAGE_BORDER: "./images/ribcage_border.jpg",
            SKELETON_BEACH: "./images/skeleton_beach.jpg",
            ALIEN_UFO: "./images/alien_ufo.jpg",
            MOTH_WOMAN: "./images/moth_woman.jpg",
            CROW_BEACH: "./images/crow_beach.jpg",
            SKELETON_LIGHTNING: "./images/skeleton_lightning.jpg" // 信号传输图 & 卫衣图
        };

        const SONGS = [
            { id: 1, title: "荒川Arakawa", duration: "03:42", src: "./audio/荒川.mp3" },
            { id: 2, title: "游园地amusement park", duration: "04:15", src: "./audio/游园地.mp3" }
        ];

        const MEMBERS = [
            {
                name: "Kunbo", name_zh: "琨波", 
                role: "Guitar / Synth / Visuals", role_zh: "吉他 / 合成器 / 视觉",
                image: "./images/guitar.jpg", 
                description: "Weaving visual noise into audio.", description_zh: "将视觉噪音编织成音频。"
            },
            {
                name: "Wenye", name_zh: "文野", 
                role: "Guitar / Synth / Production", role_zh: "吉他 / 合成器 / 制作",
                image: "./images/synth.jpg", 
                description: "Architect of the sonic landscape.", description_zh: "声景的构建者。"
            }
        ];

        const NEWS_UPDATES = [
            { id: 1, date: "DEC 08", category: "RELEASE", category_zh: "发布", title: "Disconnect EP Out Now", title_zh: "同名EP现已发售", summary: "Physical copies available.", summary_zh: "实体唱片现已在商店上架。" },
            { id: 2, date: "NOV 25", category: "EVENT", category_zh: "活动", title: "Secret Show Recap", title_zh: "秘密演出回顾", summary: "Underground bunker session photos.", summary_zh: "来自地下掩体会议的照片已上传。" }
        ];

        const MERCH_ITEMS = [
            { id: 1, name: "Self-titled EP", name_zh: "同名EP", type: "Vinyl", type_zh: "黑胶", price: "$35.00", image: "./images/my_record.jpg", soldOut: false },
            { id: 2, name: "Ritual Tee", name_zh: "仪式感 T恤", type: "Apparel", type_zh: "服饰", price: "$25.00", image: "./images/hc.jpg", soldOut: false },
            { id: 3, name: "Disconnect Hoodie", name_zh: "断连卫衣", type: "Apparel", type_zh: "服饰", price: "$55.00", image: BAND_IMAGES.SKELETON_LIGHTNING, soldOut: false },
            { id: 4, name: "Disconnect Artwork", name_zh: "Disconnect画作", type: "Print", type_zh: "海报/画作", price: "$15.00", image: "./images/qz.jpg", soldOut: false }
        ];

        const VIDEOS = [
            { id: 1, title: "Official Music Video", title_zh: "官方 MV", url: "https://www.youtube.com/watch?v=dQw4w9WgXcQ" },
            { id: 2, title: "Live Session", title_zh: "现场录制", url: "https://www.youtube.com/watch?v=dQw4w9WgXcQ" }
        ];

        const CONTENT = {
            en: {
                nav: { music: "MUSIC", news: "NEWS", visuals: "VISUALS", members: "MEMBERS", store: "STORE", guestbook: "LOGS" },
                hero: { subtitle: "Surrealist Audio Visual Collective", scroll: "Descend" },
                music: { title: "TRANSMISSIONS" },
                news: { title: "LATEST TRANSMISSIONS" },
                visuals: { title: "VISUAL ARCHIVE", subtitle: "Signals captured on tape." },
                members: { title: "THE ENTITIES", subtitle: "Fragments of consciousness." },
                store: { title: "ARTIFACTS", subtitle: "Physical manifestations of the void.", buy: "ACQUIRE", soldOut: "SOLD OUT" },
                guestbook: { title: "ECHOES OF THE VOID", namePlaceholder: "CODENAME", msgPlaceholder: "LEAVE A TRACE...", submit: "INITIATE", empty: "No signals detected." },
                footer: { rights: "All rights reserved.", designed: "Designed in the Void." }
            },
            zh: {
                nav: { music: "音乐", news: "动态", visuals: "视觉", members: "成员", store: "商店", guestbook: "留言" },
                hero: { subtitle: "超现实视听集合体", scroll: "下潜" },
                music: { title: "信号传输" },
                news: { title: "最新讯号" },
                visuals: { title: "视觉档案", subtitle: "录像带捕捉到的信号。" },
                members: { title: "实体", subtitle: "被困在数字骨骼中的意识碎片。" },
                store: { title: "遗物", subtitle: "虚空的物理具象化。", buy: "获取", soldOut: "售罄" },
                guestbook: { title: "虚空回响", namePlaceholder: "代号", msgPlaceholder: "留下你的痕迹...", submit: "启动上传", empty: "尚未检测到信号。" },
                footer: { rights: "版权所有。", designed: "设计于虚空之中。" }
            }
        };

        const getYouTubeEmbedUrl = (url) => {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? "https://www.youtube.com/embed/" + match[2] : null;
        };

        // --- 子组件 (保持原有逻辑) ---
        const MusicPlayer = ({ lang }) => {
            const [currentSongId, setCurrentSongId] = React.useState(null);
            const [isPlaying, setIsPlaying] = React.useState(false);
            const audioRef = React.useRef(null); 
            const text = CONTENT[lang].music;
            const togglePlay = (id) => {
                if (currentSongId === id) {
                    if (isPlaying) { audioRef.current.pause(); setIsPlaying(false); }
                    else { audioRef.current.play(); setIsPlaying(true); }
                } else { setCurrentSongId(id); }
            };
            React.useEffect(() => {
                if (currentSongId !== null && audioRef.current) {
                    const song = SONGS.find(s => s.id === currentSongId);
                    if (song) { audioRef.current.src = song.src; audioRef.current.play(); setIsPlaying(true); }
                }
            }, [currentSongId]);
            return (
                <div className="w-full max-w-xl mx-auto">
                    <audio ref={audioRef} onEnded={() => setIsPlaying(false)} />
                    <h3 className="text-xl md:text-2xl font-bold font-cinzel tracking-wider mb-6 border-b border-gray-800 pb-2">{text.title}</h3>
                    <div className="flex flex-col gap-2">
                        {SONGS.map((song) => (
                            <div key={song.id} onClick={() => togglePlay(song.id)}
                                className={`group flex items-center justify-between p-4 cursor-pointer transition-all duration-300 border border-transparent hover:border-gray-800 ${currentSongId === song.id ? 'bg-white/10 border-gray-800' : 'hover:bg-white/5'}`}>
                                <div className="flex items-center gap-4">
                                    <span className="text-xs text-gray-500 font-mono">{currentSongId === song.id && isPlaying ? "||" : "▶"}</span>
                                    <span className={`font-mono uppercase text-xs md:text-sm ${currentSongId === song.id ? 'text-white' : 'text-gray-400'}`}>{song.title}</span>
                                </div>
                                <span className="text-[10px] text-gray-600 font-mono">{song.duration}</span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const Visuals = ({ lang }) => (
            <div className="w-full">
                <h2 className="text-3xl md:text-5xl font-cinzel font-bold text-center mb-16 text-white tracking-widest uppercase">{CONTENT[lang].visuals.title}</h2>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-5xl mx-auto">
                    {VIDEOS.map((video) => (
                        <div key={video.id} className="w-full">
                            <div className="relative w-full aspect-video border border-gray-800 bg-black group hover:border-gray-500 transition-colors duration-500">
                                <iframe src={getYouTubeEmbedUrl(video.url)} className="absolute inset-0 w-full h-full grayscale opacity-70 group-hover:grayscale-0 group-hover:opacity-100 transition-all" frameBorder="0" allowFullScreen></iframe>
                            </div>
                            <h4 className="mt-4 text-[10px] font-mono text-gray-500 uppercase tracking-widest">{lang === 'zh' ? video.title_zh : video.title}</h4>
                        </div>
                    ))}
                </div>
            </div>
        );

        const Merchandise = ({ lang }) => (
            <div className="w-full">
                <h2 className="text-3xl md:text-5xl font-cinzel font-bold text-center mb-16 text-white tracking-widest uppercase">{CONTENT[lang].store.title}</h2>
                <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 md:gap-8">
                    {MERCH_ITEMS.map((item) => (
                        <div key={item.id} className="group flex flex-col bg-black border border-gray-900 hover:border-gray-700 transition-all">
                            <div className="aspect-square overflow-hidden bg-zinc-900">
                                <img src={item.image} alt={item.name} className="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-700" />
                            </div>
                            <div className="p-4 flex flex-col flex-grow">
                                <span className="text-[9px] text-gray-600 font-mono uppercase mb-1">{lang === 'zh' ? item.type_zh : item.type}</span>
                                <h4 className="text-xs md:text-sm font-cinzel text-white mb-4 line-clamp-1">{lang === 'zh' ? item.name_zh : item.name}</h4>
                                <button className="mt-auto w-full py-2 border border-gray-800 text-[9px] font-mono uppercase hover:bg-white hover:text-black transition-colors">
                                    {item.price} - {CONTENT[lang].store.buy}
                                </button>
                            </div>
                        </div>
                    ))}
                </div>
            </div>
        );

        const Guestbook = ({ lang }) => {
            const [messages, setMessages] = React.useState([{ id: 1, name: "System", text: "Connection Established.", date: "2024" }]);
            const [name, setName] = React.useState('');
            const [msgText, setMsgText] = React.useState('');
            const text = CONTENT[lang].guestbook;

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!msgText.trim()) return;
                const newMsg = { id: Date.now(), name: name.trim() || "Anonymous", text: msgText.trim(), date: new Date().toLocaleDateString() };
                setMessages([newMsg, ...messages]);
                setMsgText(''); setName('');
            };

            return (
                <div className="w-full max-w-4xl mx-auto flex flex-col md:flex-row gap-12">
                    <div className="w-full md:w-1/3">
                        <h3 className="text-xl font-cinzel font-bold text-white mb-6 uppercase">{text.title}</h3>
                        <form onSubmit={handleSubmit} className="flex flex-col gap-4">
                            <input type="text" value={name} onChange={(e) => setName(e.target.value)} placeholder={text.namePlaceholder} className="bg-white/5 border border-gray-800 p-3 text-white font-mono text-xs focus:outline-none focus:border-white transition-all" />
                            <textarea value={msgText} onChange={(e) => setMsgText(e.target.value)} placeholder={text.msgPlaceholder} rows="3" className="bg-white/5 border border-gray-800 p-3 text-white font-mono text-xs focus:outline-none focus:border-white transition-all resize-none"></textarea>
                            <button className="bg-white text-black py-3 text-[10px] font-mono uppercase tracking-[0.2em] hover:bg-red-600 hover:text-white transition-colors">{text.submit}</button>
                        </form>
                    </div>
                    <div className="w-full md:w-2/3 max-h-[300px] overflow-y-auto space-y-4 pr-2">
                        {messages.map((msg) => (
                            <div key={msg.id} className="border border-gray-900 p-4 hover:border-gray-700 transition-colors">
                                <div className="flex justify-between mb-1">
                                    <span className="text-[10px] font-bold text-gray-400 font-mono uppercase">{msg.name}</span>
                                    <span className="text-[9px] text-gray-700 font-mono">{msg.date}</span>
                                </div>
                                <p className="text-[11px] text-gray-500 font-mono leading-relaxed">{msg.text}</p>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // --- 主程序 ---
        const App = () => {
            const [scrolled, setScrolled] = React.useState(false);
            const [lang, setLang] = React.useState('zh'); 
            const text = CONTENT[lang];

            React.useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <div className="min-h-screen bg-black text-gray-200 selection:bg-white selection:text-black">
                    {/* 导航栏 */}
                    <nav className={`fixed top-0 w-full z-50 transition-all duration-500 ${scrolled ? 'bg-black/90 backdrop-blur-md border-b border-white/10 py-4' : 'bg-transparent py-6'}`}>
                        <div className="container mx-auto px-6 flex justify-between items-center">
                            <div className="flex items-center gap-4">
                                <div className="font-cinzel font-bold text-lg tracking-widest text-white">DISCONNECT+</div>
                                <button onClick={() => setLang(l => l === 'en' ? 'zh' : 'en')} className="text-[9px] border border-white/20 px-2 py-1 hover:bg-white hover:text-black transition-all font-mono">
                                    {lang === 'en' ? '中文' : 'EN'}
                                </button>
                            </div>
                            <div className="hidden md:flex gap-8 text-[10px] font-mono tracking-widest">
                                <a href="#music" className="hover:text-white transition-colors">{text.nav.music}</a>
                                <a href="#news" className="hover:text-white transition-colors">{text.nav.news}</a>
                                <a href="#visuals" className="hover:text-white transition-colors">{text.nav.visuals}</a>
                                <a href="#store" className="hover:text-white transition-colors">{text.nav.store}</a>
                            </div>
                        </div>
                    </nav>

                    {/* 英雄展区 - 针对手机优化标题 */}
                    <header className="relative h-screen flex items-center justify-center text-center px-4 overflow-hidden">
                        <div className="absolute inset-0 z-0 opacity-40">
                            <img src={BAND_IMAGES.SKELETON_BEACH} className="w-full h-full object-cover filter grayscale" />
                            <div className="absolute inset-0 bg-gradient-to-t from-black via-transparent to-black"></div>
                        </div>
                        <div className="relative z-10">
                            {/* 关键修改：text-4xl 为手机大小，md:text-9xl 为电脑大小 */}
                            <h1 className="text-4xl sm:text-6xl md:text-9xl font-black text-white tracking-tighter font-cinzel glitch-text uppercase" data-text="DISCONNECT+">
                                DISCONNECT+
                            </h1>
                            <p className="mt-4 text-[9px] md:text-xs font-mono tracking-[0.3em] text-gray-400 uppercase max-w-xs mx-auto md:max-w-none">
                                {text.hero.subtitle}
                            </p>
                        </div>
                    </header>

                    {/* 音乐部分 */}
                    <section id="music" className="py-24 px-6 bg-zinc-950">
                        <div className="container mx-auto flex flex-col md:flex-row gap-16 items-center">
                            <div className="w-full md:w-1/2 flex justify-center">
                                <img src={BAND_IMAGES.SKELETON_LIGHTNING} className="w-full max-w-sm grayscale border border-gray-900 shadow-2xl" />
                            </div>
                            <div className="w-full md:w-1/2">
                                <MusicPlayer lang={lang} />
                            </div>
                        </div>
                    </section>

                    {/* 新闻部分 */}
                    <section id="news" className="py-24 px-6 bg-black">
                        <div className="container mx-auto max-w-4xl">
                            <h2 className="text-3xl md:text-5xl font-cinzel font-bold text-center mb-16 text-white tracking-widest uppercase">{text.news.title}</h2>
                            {NEWS_UPDATES.map((item) => (
                                <div key={item.id} className="group flex flex-col md:flex-row items-baseline py-8 border-b border-gray-900 hover:bg-white/5 transition-colors px-4">
                                    <span className="text-xl font-bold font-cinzel text-white md:w-32">{item.date}</span>
                                    <div className="flex-grow mt-2 md:mt-0">
                                        <h3 className="text-sm md:text-base font-mono text-gray-300 uppercase">{lang === 'zh' ? item.title_zh : item.title}</h3>
                                        <p className="text-[10px] text-gray-600 font-mono mt-1">{lang === 'zh' ? item.summary_zh : item.summary}</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* 视觉 & 商店 & 留言 */}
                    <section id="visuals" className="py-24 px-6 bg-zinc-950 border-t border-gray-900">
                        <div className="container mx-auto"><Visuals lang={lang} /></div>
                    </section>

                    <section id="store" className="py-24 px-6 bg-black">
                        <div className="container mx-auto"><Merchandise lang={lang} /></div>
                    </section>

                    <section id="guestbook" className="py-24 px-6 bg-zinc-950 border-t border-gray-900">
                         <div className="container mx-auto"><Guestbook lang={lang} /></div>
                    </section>

                    <footer className="py-12 bg-black text-center border-t border-gray-900">
                        <p className="text-[9px] text-gray-700 uppercase tracking-widest font-mono">&copy; 2024 DISCONNECT+. {text.footer.rights}</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
